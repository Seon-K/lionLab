name: Notify Fork to Sync

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger fork sync workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.FORK_SYNC_TOKEN }}" \
            https://github.com/Seon-K/lionLab/dispatches \
            -d '{"event_type":"sync-fork"}'
